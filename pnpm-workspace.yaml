packages:
  - 'packages/*'
allowBuilds:
  '@vscode/vsce-sign': true
  electron-winstaller: true
  esbuild: true
  keytar: true
# Security pins (moved here from package.json#pnpm.overrides — pnpm 10+ reads
# these from pnpm-workspace.yaml, not package.json). Values starting with `>`
# must be quoted (leading `>` is a YAML block-scalar indicator).
overrides:
  undici: '>=7.28.0'
  form-data: '>=4.0.6'
  tmp: '>=0.2.6'
  lodash-es: '>=4.18.0'
  markdown-it: '>=14.2.0'
  linkify-it: '^5.0.1'
  qs: '>=6.15.2'
  js-yaml: '>=4.2.0'
  'read-yaml-file>js-yaml': '^3.14.1'
  esbuild: '>=0.28.1'
