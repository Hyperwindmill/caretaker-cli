name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    name: build-linux (deb)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Build Linux deb
        run: pnpm -F caretaker-desktop exec electron-builder --linux deb --publish never

      - name: Upload deb artifact
        uses: actions/upload-artifact@v5
        with:
          name: deb-package
          path: packages/desktop/release/*.deb
          if-no-files-found: error

  build-windows:
    name: build-windows (nsis)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Build Windows installer
        run: pnpm -F caretaker-desktop exec electron-builder --win nsis --publish never

      - name: Upload windows artifact
        uses: actions/upload-artifact@v5
        with:
          name: windows-installer
          path: packages/desktop/release/*.exe
          if-no-files-found: error

  build-vsix:
    name: build-vsix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Package VSCode extension
        run: pnpm -F caretaker-vscode package

      - name: Upload vsix artifact
        uses: actions/upload-artifact@v5
        with:
          name: vsix-package
          path: packages/vscode-extension/*.vsix
          if-no-files-found: error

  publish-release:
    name: publish-release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-vsix]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download deb artifact
        uses: actions/download-artifact@v6
        with:
          name: deb-package
          path: dist/deb

      - name: Download windows artifact
        uses: actions/download-artifact@v6
        with:
          name: windows-installer
          path: dist/windows

      - name: Download vsix artifact
        uses: actions/download-artifact@v6
        with:
          name: vsix-package
          path: dist/vsix

      - name: Assemble release notes from changesets changelogs
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          : > release_notes.md
          for pkg in cli desktop vscode-extension webview-ui types; do
            f="packages/$pkg/CHANGELOG.md"
            [ -f "$f" ] || continue
            section=$(awk -v ver="$VERSION" '$0 == "## " ver {flag=1; next} /^## / {flag=0} flag' "$f")
            # skip packages whose section only contains "Updated dependencies" bumps
            if printf '%s\n' "$section" | grep -qE '^- [0-9a-f]+: '; then
              name=$(head -1 "$f" | sed 's/^# //')
              printf '## %s\n%s\n\n' "$name" "$section" >> release_notes.md
            fi
          done
          if [ ! -s release_notes.md ]; then
            echo "_No changelog entries found for version ${VERSION}._" > release_notes.md
          fi

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          body_path: release_notes.md
          files: |
            dist/deb/*.deb
            dist/windows/*.exe
            dist/vsix/*.vsix
