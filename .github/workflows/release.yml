name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    name: build-linux (deb)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Build Linux deb
        run: pnpm -F caretaker-desktop exec electron-builder --linux deb

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: packages/desktop/release/*.deb
          if-no-files-found: error

  build-windows:
    name: build-windows (nsis)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Build Windows installer
        run: pnpm -F caretaker-desktop exec electron-builder --win nsis

      - name: Upload windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: packages/desktop/release/*.exe
          if-no-files-found: error

  build-vsix:
    name: build-vsix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Package VSCode extension
        run: pnpm -F caretaker-vscode package

      - name: Upload vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-package
          path: packages/vscode-extension/*.vsix
          if-no-files-found: error

  publish-release:
    name: publish-release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-vsix]
    permissions:
      contents: write
    steps:
      - name: Download deb artifact
        uses: actions/download-artifact@v4
        with:
          name: deb-package
          path: dist/deb

      - name: Download windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: dist/windows

      - name: Download vsix artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix-package
          path: dist/vsix

      - name: Create/update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/deb/*.deb
            dist/windows/*.exe
            dist/vsix/*.vsix
